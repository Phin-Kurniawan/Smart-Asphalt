<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#07101e;color:#ddeeff;font-family:system-ui,sans-serif;display:flex;flex-direction:column}
:root{--bg:#07101e;--bg2:#0d1828;--border:#1e3050;--accent:#3a7aff;--teal:#20b8c0;--green:#30c080;--amber:#f0a020}

.header{padding:11px 18px;background:#07101ef5;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.header h1{font-size:14px;font-weight:600;color:#c8e0ff}
.header p{font-size:11px;color:#3a5a80;margin-top:1px}
.hright{display:flex;gap:6px}
.hbtn{padding:5px 12px;border-radius:7px;border:1px solid var(--border);background:transparent;color:#6a8aaa;font-size:11px;cursor:pointer;transition:all .2s}
.hbtn:hover,.hbtn.act{background:#1a2e50;border-color:var(--accent);color:#aac4ff}

.body{display:flex;flex:1;overflow:hidden}
.map-wrap{flex:1;position:relative;overflow:hidden}
canvas#mapCv{position:absolute;top:0;left:0;width:100%;height:100%}

.sidebar{width:265px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sb-title{font-size:10px;color:#3a5a80;text-transform:uppercase;letter-spacing:.08em;padding:11px 14px 5px}
.route-list{overflow-y:auto;flex:1}
.route-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s}
.route-item:hover{background:#0f1e30}
.route-item.sel{background:#0f2040;border-left:3px solid var(--accent)}
.ri-name{font-size:12px;font-weight:500;color:#b8d0f0;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.ri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ri-stat{font-size:11px;color:#3a5a80}

.detail-box{border-top:1px solid var(--border);padding:13px;flex-shrink:0}
.detail-box h3{font-size:13px;color:#c8e0ff;margin-bottom:8px}
.drow{display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px}
.drow .dk{color:#3a5a80}.drow .dv{color:#8ab0d0;font-weight:500}
.imp-bar{height:5px;border-radius:3px;background:#0d1828;margin:3px 0 7px;overflow:hidden}
.imp-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--teal))}

.legend{padding:11px 14px;border-top:1px solid var(--border);flex-shrink:0}
.leg-title{font-size:10px;color:#3a5a80;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.leg-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:11px;color:#5a7a9a}
.leg-line{width:22px;height:3px;border-radius:2px}

/* tooltip */
.map-tooltip{position:absolute;background:#0d1828dd;border:1px solid #1e3050;border-radius:8px;padding:8px 12px;font-size:11px;color:#aac4ff;pointer-events:none;display:none;z-index:50;white-space:nowrap}

.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:lp 1.2s infinite;display:inline-block;margin-right:4px}
@keyframes lp{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(48,192,128,.5)}50%{opacity:.6;box-shadow:0 0 0 4px rgba(48,192,128,0)}}

/* zoom controls */
.zoom-ctrl{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:4px;z-index:20}
.zbtn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:#0d1828cc;color:#aac4ff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.zbtn:hover{background:#1a2e50}
 .btn-back {
            position: absolute;
            top: 5rem;
            left: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #1e293b;
            border: 1px solid var(--border);
            color: #cbd5e1;
            padding: 5px 11px;
            border-radius: 2rem;
             font-size: 11px;
            text-decoration: none;
            transition: 0.2s;
            z-index: 10;
        }
        .btn-back:hover {
           background: rgba(7,16,30, 0.25);
  color: #aac4ff;
  border-color: #3a5aaa;
        }
</style>
</head>
<body>
  <div class="header">
  <button class="btn-back" onclick="window.location.href='index.html'">← Back</button> 
  <div>
    <h1>🗺 Smart Asphalt System — Pilot City Map</h1>
    <p><span class="live-dot"></span>Jakarta Metropolitan — DWPT Corridor Candidates</p>
  </div>
  <div class="hright">
    <button class="hbtn act" onclick="filterPhase('all',this)">All Phases</button>
    <button class="hbtn" onclick="filterPhase('1',this)">Phase 1</button>
    <button class="hbtn" onclick="filterPhase('2',this)">Phase 2</button>
    <button class="hbtn" onclick="filterPhase('3',this)">Phase 3</button>
  </div>
</div>

<div class="body">
  <div class="map-wrap" id="mapWrap">
    <canvas id="mapCv"></canvas>
    <div class="map-tooltip" id="tooltip"></div>
    <div class="zoom-ctrl">
      <button class="zbtn" onclick="zoom(1.25)">+</button>
      <button class="zbtn" onclick="zoom(0.8)">−</button>
      <button class="zbtn" onclick="resetView()" title="Reset" style="font-size:11px">⟳</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sb-title">DWPT Corridors</div>
    <div class="route-list" id="routeList"></div>
    <div class="detail-box">
      <h3 id="dName">Select a corridor</h3>
      <div id="dRows"><p style="font-size:11px;color:#3a5a80">Click a route to view details and environmental impact.</p></div>
    </div>
    <div class="legend">
      <div class="leg-title">Legend</div>
      <div class="leg-row"><div class="leg-line" style="background:#3a7aff;box-shadow:0 0 5px #3a7aff"></div>Phase 1 — Smart Lane Pioneer</div>
      <div class="leg-row"><div class="leg-line" style="background:#20b8c0;box-shadow:0 0 5px #20b8c0"></div>Phase 2 — Smart Corridor</div>
      <div class="leg-row"><div class="leg-line" style="background:#30c080;box-shadow:0 0 5px #30c080"></div>Phase 3 — Smart Runway</div>
      <div class="leg-row"><div class="leg-line" style="background:#f0a020;box-shadow:0 0 5px #f0a020"></div>DWPT Node</div>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
// Jakarta bounding: lat ~-6.08 to -6.38, lng ~106.65 to 106.97
const ROUTES = [
  {id:'r1',phase:'1',name:'Jl. Sudirman–Thamrin',color:'#3a7aff',
   latlngs:[[-6.1944,106.8229],[-6.2001,106.8229],[-6.2088,106.8221],[-6.2141,106.8235],[-6.2200,106.8245],[-6.2271,106.8260]],
   km:3.8,vol:14200,co2:520,phase_label:'Phase 1',
   energy:'285 kWh/day',nodes:['Bundaran HI','Semanggi','Sudirman MRT'],
   desc:'Highest motor density in Jakarta. Ideal rapid deployment corridor.'},
  {id:'r2',phase:'1',name:'Jl. Gatot Subroto (E–W)',color:'#3a7aff',
   latlngs:[[-6.2271,106.7990],[-6.2271,106.8100],[-6.2271,106.8200],[-6.2271,106.8350],[-6.2271,106.8456]],
   km:5.1,vol:18600,co2:680,phase_label:'Phase 1',
   energy:'380 kWh/day',nodes:['Semanggi','Slipi Junction','Gatot Subroto CBD'],
   desc:'East-West arterial. High commercial density ideal for DWPT.'},
  {id:'r3',phase:'1',name:'Jl. Rasuna Said',color:'#3a7aff',
   latlngs:[[-6.2180,106.8310],[-6.2200,106.8350],[-6.2220,106.8390],[-6.2240,106.8430],[-6.2260,106.8456]],
   km:2.9,vol:11000,co2:390,phase_label:'Phase 1',
   energy:'210 kWh/day',nodes:['Kuningan','Setiabudi','Rasuna MRT'],
   desc:'Kuningan CBD — dense office traffic, ideal for motorcycle charging lane.'},
  {id:'r4',phase:'2',name:'Jl. MT Haryono – Pancoran',color:'#20b8c0',
   latlngs:[[-6.2370,106.8500],[-6.2430,106.8540],[-6.2490,106.8570],[-6.2550,106.8590],[-6.2614,106.8601]],
   km:4.2,vol:16000,co2:560,phase_label:'Phase 2',
   energy:'420 kWh/day (incl. TEG)',nodes:['Pancoran Flyover','MT Haryono','Tebet'],
   desc:'Phase 2 E-Bus corridor. Self-healing asphalt + TEG integration.'},
  {id:'r5',phase:'2',name:'Jl. Bekasi Raya (Logistics)',color:'#20b8c0',
   latlngs:[[-6.2200,106.8800],[-6.2180,106.8900],[-6.2160,106.9000],[-6.2150,106.9100],[-6.2140,106.9200]],
   km:6.3,vol:22000,co2:840,phase_label:'Phase 2',
   energy:'620 kWh/day (DWPT + Piezo)',nodes:['Cawang','Cipinang','Bekasi Barat'],
   desc:'Heaviest truck load in East Jakarta. Highest piezoelectric yield.'},
  {id:'r6',phase:'3',name:'Jakarta–Tangerang Smart Runway',color:'#30c080',
   latlngs:[[-6.1700,106.7400],[-6.1750,106.7200],[-6.1780,106.7000],[-6.1800,106.6800],[-6.1820,106.6600]],
   km:12.4,vol:8000,co2:1200,phase_label:'Phase 3',
   energy:'1,800 kWh/day — feeds local grid',nodes:['Kalideres','Tangerang Gate','Soetta Hub'],
   desc:'Smart Runway for Ground-Effect pods. 150 kW DWPT. Connects to Soetta Airport.'},
];

const NODES = [
  {name:'Bundaran HI — Node A', ll:[-6.1944,106.8229], color:'#3a7aff'},
  {name:'Semanggi — Node B',    ll:[-6.2271,106.8229], color:'#3a7aff'},
  {name:'Kuningan — Node C',    ll:[-6.2180,106.8310], color:'#20b8c0'},
  {name:'Pancoran — Node D',    ll:[-6.2614,106.8601], color:'#20b8c0'},
  {name:'Soetta Smart Runway',  ll:[-6.1820,106.6600], color:'#30c080'},
];

// ── CANVAS MAP ENGINE ─────────────────────────────────────────────────────────
const cv = document.getElementById('mapCv');
const ctx = cv.getContext('2d');
const wrap = document.getElementById('mapWrap');

// Viewport state — center on Jakarta
let vp = { lat:-6.23, lng:106.82, scale:0 };
let filterActive = 'all';
let selectedId = null;
let animT = 0;
let dashOffset = 0;
let nodeGlowT = 0;

// Drag state
let drag = {active:false, sx:0, sy:0, slat:0, slng:0};

function resize(){
  cv.width = wrap.clientWidth;
  cv.height = wrap.clientHeight;
  if(vp.scale===0) vp.scale = cv.width * 4.2; // init scale
}

// Convert lat/lng → canvas px
function ll2px(lat, lng){
  const cx = cv.width/2  + (lng - vp.lng) * vp.scale;
  const cy = cv.height/2 - (lat - vp.lat) * vp.scale;
  return [cx, cy];
}
function px2ll(x, y){
  const lng = vp.lng + (x - cv.width/2)  / vp.scale;
  const lat = vp.lat - (y - cv.height/2) / vp.scale;
  return [lat, lng];
}

// ── DRAW ──────────────────────────────────────────────────────────────────────
// Draw subtle Jakarta street grid (fake but convincing)
const STREETS = [
  // major horizontals (lat lines)
  {type:'h', lat:-6.175, label:'Jl. Daan Mogot'},
  {type:'h', lat:-6.195, label:'Jl. S. Parman'},
  {type:'h', lat:-6.210, label:'Jl. Sudirman'},
  {type:'h', lat:-6.227, label:'Jl. Gatot Subroto'},
  {type:'h', lat:-6.245, label:'Jl. Rasuna Said'},
  {type:'h', lat:-6.262, label:'Jl. MT Haryono'},
  {type:'h', lat:-6.280, label:'Jl. Otista'},
  {type:'h', lat:-6.300, label:'Jl. Raya Bogor'},
  // verticals
  {type:'v', lng:106.680, label:'Jl. Daan Mogot'},
  {type:'v', lng:106.710, label:'Jl. Kalideres'},
  {type:'v', lng:106.740, label:'Jl. Raya Serang'},
  {type:'v', lng:106.770, label:'Jl. Panjang'},
  {type:'v', lng:106.800, label:'Jl. Tomang'},
  {type:'v', lng:106.822, label:'Jl. Sudirman'},
  {type:'v', lng:106.845, label:'Jl. Kuningan'},
  {type:'v', lng:106.870, label:'Jl. Casablanca'},
  {type:'v', lng:106.900, label:'Jl. Cawang'},
  {type:'v', lng:106.930, label:'Jl. Bekasi'},
];

// Fake district polygons
const DISTRICTS = [
  {name:'Menteng',    pts:[[-6.185,106.825],[-6.185,106.845],[-6.205,106.845],[-6.205,106.825]], fill:'#0d1c2e'},
  {name:'Kuningan',  pts:[[-6.210,106.825],[-6.210,106.855],[-6.235,106.855],[-6.235,106.825]], fill:'#0c1a2a'},
  {name:'Senayan',   pts:[[-6.210,106.790],[-6.210,106.822],[-6.235,106.822],[-6.235,106.790]], fill:'#0b1828'},
  {name:'Kebayoran', pts:[[-6.235,106.785],[-6.235,106.820],[-6.265,106.820],[-6.265,106.785]], fill:'#0a1626'},
  {name:'Tangerang', pts:[[-6.155,106.640],[-6.155,106.760],[-6.200,106.760],[-6.200,106.640]], fill:'#090f1e'},
  {name:'Cawang',    pts:[[-6.215,106.870],[-6.215,106.940],[-6.260,106.940],[-6.260,106.870]], fill:'#0c1a28'},
];

function drawMap(){
  ctx.clearRect(0,0,cv.width,cv.height);

  // background
  ctx.fillStyle='#07101e'; ctx.fillRect(0,0,cv.width,cv.height);

  // district fills
  DISTRICTS.forEach(d=>{
    ctx.beginPath();
    d.pts.forEach(([lat,lng],i)=>{
      const [x,y]=ll2px(lat,lng);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    });
    ctx.closePath();
    ctx.fillStyle=d.fill; ctx.fill();
  });

  // street grid
  STREETS.forEach(s=>{
    ctx.beginPath();
    ctx.strokeStyle='#0e1e30'; ctx.lineWidth=1;
    if(s.type==='h'){
      const [x0,y]=ll2px(s.lat,106.60);
      const [x1] =ll2px(s.lat,106.98);
      ctx.moveTo(x0,y); ctx.lineTo(x1,y);
    } else {
      const [x,y0]=ll2px(-6.10,s.lng);
      const [,y1] =ll2px(-6.40,s.lng);
      ctx.moveTo(x,y0); ctx.lineTo(x,y1);
    }
    ctx.stroke();
    // label
    if(vp.scale>3000){
      ctx.fillStyle='#1e3050'; ctx.font='9px system-ui';
      const [lx,ly]=s.type==='h'?ll2px(s.lat,106.63):ll2px(-6.115,s.lng);
      ctx.save();
      if(s.type==='v'){ctx.translate(lx,ly);ctx.rotate(-Math.PI/2);ctx.fillText(s.label,0,0);}
      else ctx.fillText(s.label,lx,ly-3);
      ctx.restore();
    }
  });

  // major road overlays (slightly brighter)
  [[-6.210,-6.210],[106.822,106.822]];
  ctx.strokeStyle='#141e30'; ctx.lineWidth=2;
  // Sudirman vertical
  ctx.beginPath();
  const [sx,sy0]=ll2px(-6.17,106.822); const [,sy1]=ll2px(-6.30,106.822);
  ctx.moveTo(sx,sy0); ctx.lineTo(sx,sy1); ctx.stroke();
  // Gatot Subroto horizontal
  ctx.beginPath();
  const [gx0,gy]=ll2px(-6.227,106.76); const [gx1]=ll2px(-6.227,106.88);
  ctx.moveTo(gx0,gy); ctx.lineTo(gx1,gy); ctx.stroke();

  // Water body (fake Ciliwung river)
  ctx.beginPath();
  const rPts=[[-6.13,106.86],[-6.17,106.855],[-6.21,106.848],[-6.25,106.845],[-6.30,106.840]];
  ctx.strokeStyle='#0a1e38'; ctx.lineWidth=4;
  rPts.forEach(([lat,lng],i)=>{const [x,y]=ll2px(lat,lng);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
  ctx.stroke();

  // ── DWPT ROUTES ─────────────────────────────────────────────────────────────
  ROUTES.forEach(r => {
    const hidden = filterActive!=='all' && filterActive!==r.phase;
    const selected = r.id===selectedId;
    const alpha = hidden ? 0.08 : 1;

    // glow layers
    if(!hidden){
      [18,10].forEach((w,i)=>{
        ctx.beginPath();
        r.latlngs.forEach(([lat,lng],j)=>{
          const [x,y]=ll2px(lat,lng);
          if(j===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
        });
        ctx.strokeStyle=r.color+(i===0?'18':'28');
        ctx.lineWidth=w; ctx.stroke();
      });
    }

    // main line
    ctx.beginPath();
    r.latlngs.forEach(([lat,lng],j)=>{
      const [x,y]=ll2px(lat,lng);
      if(j===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    });
    ctx.strokeStyle=r.color; ctx.globalAlpha=alpha;
    ctx.lineWidth=selected?5.5:3.5; ctx.stroke();

    // animated dash overlay
    if(!hidden){
      ctx.setLineDash([10,18]);
      ctx.lineDashOffset=-dashOffset;
      ctx.beginPath();
      r.latlngs.forEach(([lat,lng],j)=>{
        const [x,y]=ll2px(lat,lng);
        if(j===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
      });
      ctx.strokeStyle='rgba(255,255,255,0.5)';
      ctx.lineWidth=1.5; ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.globalAlpha=1;

    // route label mid
    if(!hidden && vp.scale>3000){
      const mid=r.latlngs[Math.floor(r.latlngs.length/2)];
      const [mx,my]=ll2px(mid[0],mid[1]);
      ctx.fillStyle=r.color; ctx.font='bold 10px system-ui';
      ctx.fillText(r.km+'km',mx+5,my-6);
    }
  });

  // ── NODES ────────────────────────────────────────────────────────────────────
  nodeGlowT+=.02;
  NODES.forEach((n,i)=>{
    const [x,y]=ll2px(n.ll[0],n.ll[1]);
    const pulse=Math.sin(nodeGlowT+i)*.5+.5;
    // outer glow
    const grd=ctx.createRadialGradient(x,y,2,x,y,22+pulse*8);
    const hex=n.color.replace('#','');
    const r2=parseInt(hex.slice(0,2),16),g2=parseInt(hex.slice(2,4),16),b2=parseInt(hex.slice(4,6),16);
    grd.addColorStop(0,`rgba(${r2},${g2},${b2},${.3+pulse*.2})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(x,y,22+pulse*8,0,Math.PI*2); ctx.fill();
    // dot
    ctx.beginPath(); ctx.arc(x,y,7,0,Math.PI*2);
    ctx.fillStyle=n.color; ctx.fill();
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=2; ctx.stroke();
    // label
    if(vp.scale>2500){
      ctx.fillStyle='#aac4ff'; ctx.font='10px system-ui';
      ctx.fillText(n.name.split('\n')[0],x+10,y+4);
    }
  });

  // compass
  const cx2=cv.width-36,cy2=cv.height-70;
  ctx.fillStyle='#1e3050'; ctx.beginPath(); ctx.arc(cx2,cy2,14,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#7a9acc'; ctx.font='bold 10px system-ui'; ctx.textAlign='center';
  ctx.fillText('N',cx2,cy2-3); ctx.fillText('↑',cx2,cy2+7); ctx.textAlign='left';

  // scale bar
  const scaleMeters=Math.round(40000/vp.scale*1000)/1000;
  const scaleKm=scaleMeters<1?(scaleMeters*1000).toFixed(0)+'m':scaleMeters.toFixed(1)+'km';
  ctx.strokeStyle='#3a5a80'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(14,cv.height-16); ctx.lineTo(74,cv.height-16); ctx.stroke();
  ctx.fillStyle='#3a5a80'; ctx.font='9px system-ui';
  ctx.fillText(scaleKm,14,cv.height-6);
}

// ── ANIMATION LOOP ────────────────────────────────────────────────────────────
function loop(){
  animT+=.016; dashOffset+=0.8;
  drawMap();
  requestAnimationFrame(loop);
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────
// Drag to pan
cv.addEventListener('mousedown',e=>{
  drag.active=true; drag.sx=e.clientX; drag.sy=e.clientY;
  drag.slat=vp.lat; drag.slng=vp.lng;
  cv.style.cursor='grabbing';
});
window.addEventListener('mouseup',()=>{drag.active=false;cv.style.cursor='default';});
window.addEventListener('mousemove',e=>{
  if(drag.active){
    const dlng=(e.clientX-drag.sx)/vp.scale;
    const dlat=(e.clientY-drag.sy)/vp.scale;
    vp.lng=drag.slng-dlng; vp.lat=drag.slat+dlat;
  }
  // hover tooltip
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const [hlat,hlng]=px2ll(mx,my);
  let hit=null;
  ROUTES.forEach(r=>{
    if(filterActive!=='all'&&filterActive!==r.phase)return;
    r.latlngs.forEach(([lat,lng],i)=>{
      if(i===0)return;
      const [ax,ay]=ll2px(r.latlngs[i-1][0],r.latlngs[i-1][1]);
      const [bx,by]=ll2px(lat,lng);
      const [px,py]=ll2px(hlat,hlng);
      const dx=bx-ax,dy=by-ay;
      const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/(dx*dx+dy*dy)));
      const cx2=ax+t*dx,cy2=ay+t*dy;
      const dist=Math.hypot(px-cx2,py-cy2);
      if(dist<10) hit=r;
    });
  });
  const tip=document.getElementById('tooltip');
  if(hit){
    tip.style.display='block';
    tip.style.left=(e.clientX-rect.left+12)+'px';
    tip.style.top=(e.clientY-rect.top-28)+'px';
    tip.innerHTML=`<b>${hit.name}</b><br>${hit.km}km · ${hit.vol.toLocaleString()} veh/day · CO₂ –${hit.co2}kg/day`;
    cv.style.cursor=drag.active?'grabbing':'pointer';
  } else {
    tip.style.display='none';
    cv.style.cursor=drag.active?'grabbing':'default';
  }
});
cv.addEventListener('click',e=>{
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const [hlat,hlng]=px2ll(mx,my);
  ROUTES.forEach(r=>{
    if(filterActive!=='all'&&filterActive!==r.phase)return;
    r.latlngs.forEach(([lat,lng],i)=>{
      if(i===0)return;
      const [ax,ay]=ll2px(r.latlngs[i-1][0],r.latlngs[i-1][1]);
      const [bx,by]=ll2px(lat,lng);
      const [px,py]=ll2px(hlat,hlng);
      const dx=bx-ax,dy=by-ay;
      const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/(dx*dx+dy*dy)));
      const cx2=ax+t*dx,cy2=ay+t*dy;
      if(Math.hypot(px-cx2,py-cy2)<10) selectRoute(r.id);
    });
  });
});
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const factor=e.deltaY<0?1.15:0.87;
  vp.scale*=factor;
},{passive:false});
// Touch pan
let lastTouch=null;
cv.addEventListener('touchstart',e=>{lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY,lat:vp.lat,lng:vp.lng};});
cv.addEventListener('touchmove',e=>{
  if(!lastTouch)return;
  const dx=(e.touches[0].clientX-lastTouch.x)/vp.scale;
  const dy=(e.touches[0].clientY-lastTouch.y)/vp.scale;
  vp.lng=lastTouch.lng-dx; vp.lat=lastTouch.lat+dy;
  e.preventDefault();
},{passive:false});

function zoom(f){vp.scale*=f;}
function resetView(){vp.lat=-6.23;vp.lng=106.82;vp.scale=cv.width*4.2;}

// ── SIDEBAR ───────────────────────────────────────────────────────────────────
const listEl=document.getElementById('routeList');
ROUTES.forEach(r=>{
  const d=document.createElement('div'); d.className='route-item'; d.id='li-'+r.id;
  d.innerHTML=`<div class="ri-name"><span class="ri-dot" style="background:${r.color}"></span>${r.name}</div><div class="ri-stat">${r.phase_label} · ${r.km}km · ${r.vol.toLocaleString()} veh/day</div>`;
  d.onclick=()=>selectRoute(r.id);
  listEl.appendChild(d);
});

function selectRoute(id){
  selectedId=id;
  document.querySelectorAll('.route-item').forEach(el=>el.classList.remove('sel'));
  document.getElementById('li-'+id).classList.add('sel');
  document.getElementById('li-'+id).scrollIntoView({behavior:'smooth',block:'nearest'});
  const r=ROUTES.find(x=>x.id===id);
  document.getElementById('dName').textContent=r.name;
  const pct=Math.min(100,(r.co2/1200)*100);
  document.getElementById('dRows').innerHTML=`
    <div class="drow"><span class="dk">Phase</span><span class="dv">${r.phase_label}</span></div>
    <div class="drow"><span class="dk">Length</span><span class="dv">${r.km} km</span></div>
    <div class="drow"><span class="dk">Daily traffic</span><span class="dv">${r.vol.toLocaleString()} vehicles</span></div>
    <div class="drow"><span class="dk">CO₂ reduction</span><span class="dv">${r.co2} kg/day</span></div>
    <div class="imp-bar"><div class="imp-fill" style="width:${pct}%"></div></div>
    <div class="drow"><span class="dk">Energy harvest</span><span class="dv">${r.energy}</span></div>
    <div style="font-size:10px;color:#3a5a80;margin:5px 0 3px">Key nodes:</div>
    ${r.nodes.map(n=>`<div style="font-size:11px;color:#5a8aaa;margin-bottom:2px">• ${n}</div>`).join('')}
    <div style="font-size:11px;color:#4a6a8a;margin-top:7px;line-height:1.6">${r.desc}</div>
  `;
  // pan map to route center
  const lats=r.latlngs.map(p=>p[0]), lngs=r.latlngs.map(p=>p[1]);
  vp.lat=(Math.min(...lats)+Math.max(...lats))/2;
  vp.lng=(Math.min(...lngs)+Math.max(...lngs))/2;
}

function filterPhase(ph,btn){
  filterActive=ph;
  document.querySelectorAll('.hbtn').forEach(b=>b.classList.remove('act'));
  btn.classList.add('act');
  document.querySelectorAll('.route-item').forEach(el=>{
    const r=ROUTES.find(x=>'li-'+x.id===el.id);
    const show=ph==='all'||r.phase===ph;
    el.style.opacity=show?'1':'.3';
    el.style.pointerEvents=show?'auto':'none';
  });
}

// ── INIT ──────────────────────────────────────────────────────────────────────
resize();
window.addEventListener('resize',()=>{resize();});
loop();
setTimeout(()=>selectRoute('r1'),400);
</script>
